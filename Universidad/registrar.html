<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registrar Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <h2>Registrar Nuevo Usuario</h2>
    <form action="procesar_registro.php" method="POST" class="row g-3 mt-2">
        <div class="col-md-6"><label>Nombre</label><input type="text" name="nombre" class="form-control" required></div>
        <div class="col-md-6"><label>Apellido</label><input type="text" name="apellido" class="form-control" required>
        </div>
        <div class="col-md-4"><label>Edad</label><input type="number" name="edad" class="form-control"></div>
        <div class="col-md-8"><label>Email</label><input type="email" name="email" class="form-control"></div>
        <div class="col-md-4"><label>Fecha de Registro</label><input type="date" name="fecha_registro"
                class="form-control"></div>
        <div class="col-md-4"><label>Teléfono</label><input type="text" name="telefono" class="form-control"></div>
        <div class="col-md-6"><label>Usuario</label><input type="text" name="usuario" class="form-control" required>
        </div>
        <div class="col-md-6"><label>Contraseña</label><input type="password" name="contrasena" class="form-control"
                required></div>
        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary">Registrar</button>
            <a href="principal.html" class="btn btn-secondary">Volver al menú</a>
        </div>
    </form>
</body>

</html>
